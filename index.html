<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>翻页时钟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #000; color: #c9a26a;
    overflow: hidden;
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    padding-bottom: env(safe-area-inset-bottom);
    padding-top: env(safe-area-inset-top);
  }
  .clock {
    display: flex;
    gap: 4vmin;
    align-items: center;
  }
  .flip {
    position: relative;
    width: 28vmin;
    height: 40vmin;
    perspective: 600px;
  }
  .card {
    position: absolute;
    inset: 0;
    border-radius: 2.5vmin;
    background: #111;
    overflow: hidden;
  }
  .card .digit {
    position: absolute;
    left: 0; right: 0;
    height: 40vmin;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Helvetica Neue", "PingFang SC", sans-serif;
    font-weight: 800;
    font-size: 32vmin;
    line-height: 1;
    color: #c9a26a;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    -webkit-font-smoothing: antialiased;
  }
  /* Static halves showing current digit */
  .top, .bottom {
    z-index: 1;
  }
  .top {
    bottom: 50%;
    border-bottom: 1px solid #000;
  }
  .top .digit { top: 0; }
  .bottom {
    top: 50%;
  }
  .bottom .digit { bottom: 0; }

  /* Flipping halves */
  .flip-top, .flip-bottom {
    z-index: 2;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .flip-top {
    bottom: 50%;
    transform-origin: bottom;
    border-bottom: 1px solid #000;
  }
  .flip-top .digit { top: 0; }
  .flip-bottom {
    top: 50%;
    transform-origin: top;
    transform: rotateX(90deg);
  }
  .flip-bottom .digit { bottom: 0; }

  .flip.go .flip-top {
    animation: flip-top 0.6s ease-in forwards;
  }
  .flip.go .flip-bottom {
    animation: flip-bottom 0.6s ease-out 0.6s forwards;
  }
  @keyframes flip-top {
    0% { transform: rotateX(0); }
    100% { transform: rotateX(-90deg); }
  }
  @keyframes flip-bottom {
    0% { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
  }

  .top .digit, .flip-bottom .digit {
    /* show CURRENT (new) digit */
  }
  .bottom .digit, .flip-top .digit {
    /* show PREVIOUS (old) digit */
  }

  .colon {
    font-size: 24vmin;
    line-height: 1;
    font-weight: 800;
    color: #c9a26a;
    transform: translateY(-1vmin);
  }
</style>
</head>
<body>
  <div class="clock">
    <div class="flip" id="h1">
      <div class="card top"><div class="digit">0</div></div>
      <div class="card bottom"><div class="digit">0</div></div>
      <div class="card flip-top"><div class="digit">0</div></div>
      <div class="card flip-bottom"><div class="digit">0</div></div>
    </div>
    <div class="flip" id="h2">
      <div class="card top"><div class="digit">0</div></div>
      <div class="card bottom"><div class="digit">0</div></div>
      <div class="card flip-top"><div class="digit">0</div></div>
      <div class="card flip-bottom"><div class="digit">0</div></div>
    </div>
    <div class="colon">:</div>
    <div class="flip" id="m1">
      <div class="card top"><div class="digit">0</div></div>
      <div class="card bottom"><div class="digit">0</div></div>
      <div class="card flip-top"><div class="digit">0</div></div>
      <div class="card flip-bottom"><div class="digit">0</div></div>
    </div>
    <div class="flip" id="m2">
      <div class="card top"><div class="digit">0</div></div>
      <div class="card bottom"><div class="digit">0</div></div>
      <div class="card flip-top"><div class="digit">0</div></div>
      <div class="card flip-bottom"><div class="digit">0</div></div>
    </div>
  </div>

<script>
  const slots = ['h1', 'h2', 'm1', 'm2'].map(id => {
    const el = document.getElementById(id);
    return {
      el,
      top: el.querySelector('.top .digit'),
      bottom: el.querySelector('.bottom .digit'),
      flipTop: el.querySelector('.flip-top .digit'),
      flipBottom: el.querySelector('.flip-bottom .digit'),
      value: null,
    };
  });

  function setSlot(slot, newVal) {
    if (slot.value === newVal) return;
    const oldVal = slot.value === null ? newVal : slot.value;
    // top (static) shows new immediately when no animation; for animation we need:
    //   - flip-top shows OLD (rotates from 0 to -90)
    //   - bottom (static below) shows OLD until flip-bottom covers it
    //   - flip-bottom shows NEW (rotates from 90 to 0)
    //   - top (static) shows NEW (visible after flip-top rotates away)
    slot.flipTop.textContent = oldVal;
    slot.bottom.textContent = oldVal;
    slot.flipBottom.textContent = newVal;
    slot.top.textContent = newVal;

    if (slot.value !== null) {
      slot.el.classList.remove('go');
      // force reflow to restart animation
      void slot.el.offsetWidth;
      slot.el.classList.add('go');
      // after animation, settle
      setTimeout(() => {
        slot.bottom.textContent = newVal;
      }, 1200);
    } else {
      slot.bottom.textContent = newVal;
    }
    slot.value = newVal;
  }

  function update() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const digits = (h + m).split('');
    digits.forEach((d, i) => setSlot(slots[i], d));
  }

  update();
  // Tick every second to catch minute changes promptly
  setInterval(update, 1000);

  // Tap toggles fullscreen
  document.body.addEventListener('click', () => {
    if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else if (document.fullscreenElement) {
      document.exitFullscreen().catch(() => {});
    }
  });

  // Prevent screen sleep via Wake Lock API (Safari 16.4+)
  let wakeLock = null;
  async function keepAwake() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch (e) {}
  }
  keepAwake();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') keepAwake();
  });
</script>
</body>
</html>
