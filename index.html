<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>翻页时钟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #000; color: #c9a26a;
    overflow: hidden;
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    padding-bottom: env(safe-area-inset-bottom);
    padding-top: env(safe-area-inset-top);
  }
  .stage {
    /* one cell = one flip-card width; clamp by BOTH viewport axes so the
       whole stack (按钮+时钟+计时) fits — 22vh keeps it inside landscape
       iPad Air 5 (1180×820) without overflowing top/bottom */
    --cell: min(19vw, 22vh);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: calc(var(--cell) * 0.16);
  }
  .calls {
    display: flex;
    gap: calc(var(--cell) * 0.2);
    align-items: center;
  }
  .clock {
    display: flex;
    gap: calc(var(--cell) * 0.14);
    align-items: center;
  }
  .flip {
    position: relative;
    width: var(--cell);
    height: calc(var(--cell) * 1.42);
    perspective: 600px;
  }
  .card {
    position: absolute;
    inset: 0;
    border-radius: calc(var(--cell) * 0.09);
    background: #111;
    overflow: hidden;
  }
  .card .digit {
    position: absolute;
    left: 0; right: 0;
    height: calc(var(--cell) * 1.42);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Helvetica Neue", "PingFang SC", sans-serif;
    font-weight: 800;
    font-size: calc(var(--cell) * 1.14);
    line-height: 1;
    color: #c9a26a;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    -webkit-font-smoothing: antialiased;
  }
  /* Static halves showing current digit */
  .top, .bottom {
    z-index: 1;
  }
  .top {
    bottom: 50%;
    border-bottom: 1px solid #000;
  }
  .top .digit { top: 0; }
  .bottom {
    top: 50%;
  }
  .bottom .digit { bottom: 0; }

  /* Flipping halves */
  .flip-top, .flip-bottom {
    z-index: 2;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .flip-top {
    bottom: 50%;
    transform-origin: bottom;
    border-bottom: 1px solid #000;
  }
  .flip-top .digit { top: 0; }
  .flip-bottom {
    top: 50%;
    transform-origin: top;
    transform: rotateX(90deg);
  }
  .flip-bottom .digit { bottom: 0; }

  .flip.go .flip-top {
    animation: flip-top 0.6s ease-in forwards;
  }
  .flip.go .flip-bottom {
    animation: flip-bottom 0.6s ease-out 0.6s forwards;
  }
  @keyframes flip-top {
    0% { transform: rotateX(0); }
    100% { transform: rotateX(-90deg); }
  }
  @keyframes flip-bottom {
    0% { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
  }

  .top .digit, .flip-bottom .digit {
    /* show CURRENT (new) digit */
  }
  .bottom .digit, .flip-top .digit {
    /* show PREVIOUS (old) digit */
  }

  .colon {
    font-size: calc(var(--cell) * 0.85);
    line-height: 1;
    font-weight: 800;
    color: #c9a26a;
    transform: translateY(calc(var(--cell) * -0.04));
  }

  /* ---- Timer / 计时 ---- */
  .timer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: calc(var(--cell) * 0.11);
  }
  /* 模块一：最近 3 次记录 */
  .records {
    display: flex;
    gap: calc(var(--cell) * 0.14);
    align-items: center;
    min-height: calc(var(--cell) * 0.44);
  }
  .records:empty::after {
    content: "暂无记录";
    color: #4a4a4a;
    font-size: calc(var(--cell) * 0.26);
    font-weight: 600;
  }
  .chip {
    appearance: none; -webkit-appearance: none;
    font-family: inherit;
    font-size: calc(var(--cell) * 0.28);
    font-weight: 700;
    color: #80693f;
    background: transparent;
    border: 2px solid rgba(201, 162, 106, 0.22);
    border-radius: 999px;
    padding: calc(var(--cell) * 0.06) calc(var(--cell) * 0.17);
    font-variant-numeric: tabular-nums;
    cursor: pointer;
    line-height: 1;
  }
  .chip:active { background: rgba(201, 162, 106, 0.1); }
  /* 模块二：距离上一次 */
  .elapsed {
    font-size: calc(var(--cell) * 0.27);
    font-weight: 700;
    color: #8a7048;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .rec-btn {
    appearance: none; -webkit-appearance: none;
    font-family: inherit;
    font-size: calc(var(--cell) * 0.3);
    font-weight: 800;
    color: #a08754;
    background: rgba(201, 162, 106, 0.1);
    border: 2px solid rgba(201, 162, 106, 0.28);
    border-radius: 999px;
    padding: calc(var(--cell) * 0.12) calc(var(--cell) * 0.5);
    cursor: pointer;
    line-height: 1;
  }
  .rec-btn:active { transform: scale(0.96); background: rgba(201, 162, 106, 0.18); }
  /* 来一下：联系人推送按钮（时钟上方，描边样式以区别于「喝完了」） */
  .call-btn {
    appearance: none; -webkit-appearance: none;
    font-family: inherit;
    font-size: calc(var(--cell) * 0.26);
    font-weight: 800;
    color: #80693f;
    background: transparent;
    border: 2px solid rgba(201, 162, 106, 0.28);
    border-radius: 999px;
    padding: calc(var(--cell) * 0.1) calc(var(--cell) * 0.34);
    cursor: pointer;
    line-height: 1;
    white-space: nowrap;
    transition: background .2s, color .2s, opacity .2s;
  }
  .call-btn:active { transform: scale(0.96); }
  .call-btn.sent { background: rgba(201, 162, 106, 0.18); color: #a08754; }
  .call-btn:disabled { opacity: 0.55; }

  /* 上下滑动调暗：黑色蒙版（网页无法改系统亮度，用蒙版模拟） */
  .dimmer {
    position: fixed;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;   /* 纯视觉，不拦截点按 */
    z-index: 50;
  }
  .dim-hint {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 51;
    pointer-events: none;
    color: #c9a26a;
    font-size: 7vmin;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    opacity: 0;
    transition: opacity .3s;
  }
  .dim-hint.show { opacity: 0.9; }
</style>
</head>
<body>
  <div class="stage">
  <div class="calls" id="calls"></div>
  <div class="clock">
    <div class="flip" id="h1">
      <div class="card top"><div class="digit">0</div></div>
      <div class="card bottom"><div class="digit">0</div></div>
      <div class="card flip-top"><div class="digit">0</div></div>
      <div class="card flip-bottom"><div class="digit">0</div></div>
    </div>
    <div class="flip" id="h2">
      <div class="card top"><div class="digit">0</div></div>
      <div class="card bottom"><div class="digit">0</div></div>
      <div class="card flip-top"><div class="digit">0</div></div>
      <div class="card flip-bottom"><div class="digit">0</div></div>
    </div>
    <div class="colon">:</div>
    <div class="flip" id="m1">
      <div class="card top"><div class="digit">0</div></div>
      <div class="card bottom"><div class="digit">0</div></div>
      <div class="card flip-top"><div class="digit">0</div></div>
      <div class="card flip-bottom"><div class="digit">0</div></div>
    </div>
    <div class="flip" id="m2">
      <div class="card top"><div class="digit">0</div></div>
      <div class="card bottom"><div class="digit">0</div></div>
      <div class="card flip-top"><div class="digit">0</div></div>
      <div class="card flip-bottom"><div class="digit">0</div></div>
    </div>
  </div>

  <div class="timer">
    <div class="records" id="records"></div>
    <div class="elapsed" id="elapsed">距离上一次：-- : --</div>
    <button class="rec-btn" id="recBtn">喝完了</button>
  </div>
  </div>

  <div class="dimmer" id="dimmer"></div>
  <div class="dim-hint" id="dimHint"></div>

<script>
  // ===================== Bark 推送配置 =====================
  // 每个联系人一个按钮：name = 按钮文案，key = 该手机 Bark App 首页的 key
  const BARK_CONTACTS = [
    { name: '小莫', key: 'mLjHs43zVgDTjGWVtBhJrH' },
    { name: '小张', key: '7GraXZMisGw7WZYWbt34D' },
  ];
  const BARK_SERVER = 'https://api.day.app'; // 官方公共服务器；自建可改成 https://你的域名
  const BARK_TITLE  = '来一下';
  const BARK_BODY   = '宝宝找你～';
  const BARK_GROUP  = '夜灯时钟';            // 通知分组，便于在手机上归类
  // ========================================================

  const slots = ['h1', 'h2', 'm1', 'm2'].map(id => {
    const el = document.getElementById(id);
    return {
      el,
      top: el.querySelector('.top .digit'),
      bottom: el.querySelector('.bottom .digit'),
      flipTop: el.querySelector('.flip-top .digit'),
      flipBottom: el.querySelector('.flip-bottom .digit'),
      value: null,
    };
  });

  function setSlot(slot, newVal) {
    if (slot.value === newVal) return;
    const oldVal = slot.value === null ? newVal : slot.value;
    // top (static) shows new immediately when no animation; for animation we need:
    //   - flip-top shows OLD (rotates from 0 to -90)
    //   - bottom (static below) shows OLD until flip-bottom covers it
    //   - flip-bottom shows NEW (rotates from 90 to 0)
    //   - top (static) shows NEW (visible after flip-top rotates away)
    slot.flipTop.textContent = oldVal;
    slot.bottom.textContent = oldVal;
    slot.flipBottom.textContent = newVal;
    slot.top.textContent = newVal;

    if (slot.value !== null) {
      slot.el.classList.remove('go');
      // force reflow to restart animation
      void slot.el.offsetWidth;
      slot.el.classList.add('go');
      // after animation, settle
      setTimeout(() => {
        slot.bottom.textContent = newVal;
      }, 1200);
    } else {
      slot.bottom.textContent = newVal;
    }
    slot.value = newVal;
  }

  function update() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const digits = (h + m).split('');
    digits.forEach((d, i) => setSlot(slots[i], d));
  }

  // ---- Timer / 计时 ----
  const STORE_KEY = 'feedRecords';
  const recordsEl = document.getElementById('records');
  const elapsedEl = document.getElementById('elapsed');
  const recBtn = document.getElementById('recBtn');
  let records = []; // ascending list of timestamps (ms), keep newest 10

  function loadRecords() {
    try { records = JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
    catch (e) { records = []; }
    if (!Array.isArray(records)) records = [];
  }
  function saveRecords() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(records)); } catch (e) {}
  }
  function pad2(n) { return String(n).padStart(2, '0'); }
  function fmtClock(ts) {
    const d = new Date(ts);
    return pad2(d.getHours()) + ':' + pad2(d.getMinutes());
  }

  // 模块一：保留最近 10 次，只展示最近 3 次（左→右，最右最新）；点击删除该条
  function renderRecords() {
    records.sort((a, b) => a - b);
    if (records.length > 10) records = records.slice(records.length - 10);
    const show = records.slice(Math.max(0, records.length - 3));
    recordsEl.innerHTML = '';
    show.forEach(ts => {
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.textContent = fmtClock(ts);
      chip.addEventListener('click', (e) => {
        e.stopPropagation();
        records = records.filter(t => t !== ts);
        saveRecords();
        renderRecords();
        renderElapsed();
      });
      recordsEl.appendChild(chip);
    });
  }

  // 模块二：距离最近一次计时的时间差 HH : mm
  function renderElapsed() {
    if (records.length === 0) {
      elapsedEl.textContent = '距离上一次：-- : --';
      return;
    }
    const last = Math.max.apply(null, records);
    // 按「分钟」对齐计算：时钟显示的分钟 − 最新记录的分钟，
    // 与模块一展示的 HH:MM 完全一致（避免秒数造成 1 分钟误差）
    let diffMin = Math.floor(Date.now() / 60000) - Math.floor(last / 60000);
    if (diffMin < 0) diffMin = 0;
    const hh = pad2(Math.floor(diffMin / 60));
    const mm = pad2(diffMin % 60);
    elapsedEl.textContent = '距离上一次：' + hh + ' : ' + mm;
  }

  recBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    records.push(Date.now());
    saveRecords();
    renderRecords();
    renderElapsed();
  });

  // ---- 来一下：每个联系人一个按钮，单独推送 ----
  const callsEl = document.getElementById('calls');

  function sendOne(contact, btn) {
    const key = contact.key;
    if (!key || /^PHONE_\d_KEY$/.test(key)) {
      btn.textContent = '未配置';
      setTimeout(() => { btn.textContent = contact.name; btn.disabled = false; }, 2000);
      return;
    }
    const path = '/' + encodeURIComponent(BARK_TITLE) + '/' + encodeURIComponent(BARK_BODY)
               + '?group=' + encodeURIComponent(BARK_GROUP);
    // no-cors：发完即走，无需服务器返回 CORS 头；失败也不阻塞 UI
    Promise.allSettled(
      [fetch(BARK_SERVER + '/' + key + path, { mode: 'no-cors', cache: 'no-store' })]
    ).then(() => {
      btn.classList.add('sent');
      btn.textContent = '已通知 ✓';
      setTimeout(() => {
        btn.classList.remove('sent');
        btn.textContent = contact.name;
        btn.disabled = false;
      }, 2500);
    });
  }

  BARK_CONTACTS.forEach(contact => {
    const btn = document.createElement('button');
    btn.className = 'call-btn';
    btn.textContent = contact.name;
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (btn.disabled) return;
      btn.disabled = true;
      btn.textContent = '发送中…';
      sendOne(contact, btn);
    });
    callsEl.appendChild(btn);
  });

  // ---- 上下滑动调暗屏幕（黑色蒙版模拟；网页无法改系统亮度）----
  const DIM_KEY = 'dimLevel';
  const dimmer = document.getElementById('dimmer');
  const dimHint = document.getElementById('dimHint');
  const MAX_DIM = 0.85;            // 最暗仍保留约 15% 可见，避免全黑看不到时钟
  let dimLevel = 0;                // 0 = 最亮（无蒙版），MAX_DIM = 最暗
  let dragStartY = null;
  let dragStartDim = 0;
  let moved = false;
  let hintTimer = null;

  function applyDim() { dimmer.style.opacity = String(dimLevel); }
  function showHint() {
    dimHint.textContent = '☀ ' + Math.round((1 - dimLevel) * 100) + '%';
    dimHint.classList.add('show');
    if (hintTimer) clearTimeout(hintTimer);
    hintTimer = setTimeout(() => dimHint.classList.remove('show'), 700);
  }
  (function loadDim() {
    const v = parseFloat(localStorage.getItem(DIM_KEY));
    if (!isNaN(v)) dimLevel = Math.min(MAX_DIM, Math.max(0, v));
    applyDim();
  })();

  document.addEventListener('pointerdown', (e) => {
    if (e.target.closest('button')) return; // 按钮上的操作交给按钮自己
    dragStartY = e.clientY;
    dragStartDim = dimLevel;
    moved = false;
  });
  document.addEventListener('pointermove', (e) => {
    if (dragStartY === null) return;
    const dy = e.clientY - dragStartY;
    if (Math.abs(dy) > 6) moved = true;
    // 向下滑 = 更暗，向上滑 = 更亮
    dimLevel = Math.min(MAX_DIM, Math.max(0, dragStartDim + dy / (window.innerHeight * 0.7)));
    applyDim();
    showHint();
  });
  function endDrag() {
    if (dragStartY === null) return;
    dragStartY = null;
    localStorage.setItem(DIM_KEY, String(dimLevel));
  }
  document.addEventListener('pointerup', endDrag);
  document.addEventListener('pointercancel', endDrag);

  loadRecords();
  renderRecords();
  renderElapsed();

  // Tick every second: refresh clock digits + elapsed counter
  function tick() {
    update();
    renderElapsed();
  }
  tick();
  setInterval(tick, 1000);

  // Tap the clock (not the timer controls) to toggle fullscreen
  document.querySelector('.clock').addEventListener('click', () => {
    if (moved) { moved = false; return; } // 刚才是滑动调暗，不触发全屏
    if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else if (document.fullscreenElement) {
      document.exitFullscreen().catch(() => {});
    }
  });

  // Prevent screen sleep via Wake Lock API (Safari 16.4+)
  let wakeLock = null;
  async function keepAwake() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch (e) {}
  }
  keepAwake();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      keepAwake();
      // 后台/熄屏会暂停 setInterval，回到页面立即刷新时钟与「距离上一次」
      tick();
    }
  });
</script>
</body>
</html>
